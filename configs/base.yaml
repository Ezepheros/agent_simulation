# Base config — shared defaults inherited by all run configs.
# Child configs set `base_config: ../../configs/base.yaml` and override only what differs.

run_id: base
task: ""
description: ""

llm:
  type: backends.lmstudio.LMStudioBackend
  base_url: http://localhost:1234/v1
  model: mistralai/ministral-3-14b-reasoning
  temperature: 0.1
  max_tokens: 2048
  timeout_s: 120.0

agent:
  type: agents.react.ReActAgent
  max_steps: 10
  system_prompt: null  # uses agent default

tools: []

logging:
  level: INFO
  log_dir: runs/{run_id}/logs
